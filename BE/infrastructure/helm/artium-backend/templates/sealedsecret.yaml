{{- if .Values.sealedSecrets.enabled }}
{{- if not .Values.sealedSecrets.encryptedData }}
{{- fail "sealedSecrets.enabled=true requires sealedSecrets.encryptedData. Generate a SealedSecret with scripts/seal-secrets.sh, or set sealedSecrets.enabled=false and apply the generated SealedSecret separately." }}
{{- end }}
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: {{ .Values.sealedSecrets.name | quote }}
  namespace: {{ .Values.namespace.name | quote }}
  labels:
    {{- include "artium-backend.labels" . | nindent 4 }}
spec:
  encryptedData:
    {{- toYaml .Values.sealedSecrets.encryptedData | nindent 4 }}
  template:
    metadata:
      name: {{ .Values.sealedSecrets.name | quote }}
      namespace: {{ .Values.namespace.name | quote }}
      labels:
        {{- include "artium-backend.labels" . | nindent 8 }}
    type: Opaque
{{- end }}
