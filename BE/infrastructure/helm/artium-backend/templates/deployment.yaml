{{- range $name, $service := .Values.services }}
{{- if $service.enabled }}
{{- $image := index $.Values.images $name }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "artium-backend.serviceName" (dict "root" $ "name" $name) }}
  namespace: {{ $.Values.namespace.name | quote }}
  labels:
    {{- include "artium-backend.labels" $ | nindent 4 }}
    artium.io/workload: {{ $name | quote }}
    artium.io/workload-kind: api
spec:
  replicas: {{ default 1 $service.replicaCount }}
  selector:
    matchLabels:
      {{- include "artium-backend.selectorLabels" $ | nindent 6 }}
      artium.io/workload: {{ $name | quote }}
      artium.io/workload-kind: api
  template:
    metadata:
      labels:
        {{- include "artium-backend.selectorLabels" $ | nindent 8 }}
        artium.io/workload: {{ $name | quote }}
        artium.io/workload-kind: api
    spec:
      containers:
        - name: {{ $name }}
          image: {{ include "artium-backend.image" (dict "image" $image) | quote }}
          imagePullPolicy: {{ $.Values.global.imagePullPolicy | quote }}
          {{- with $service.command }}
          command:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            {{- with $service.ports.http }}
            - name: http
              containerPort: {{ . }}
            {{- end }}
            {{- with $service.ports.tcp }}
            - name: tcp
              containerPort: {{ . }}
            {{- end }}
          env:
            - name: PORT
              value: {{ default "" $service.ports.http | quote }}
            - name: port
              value: {{ default "" $service.ports.http | quote }}
            - name: MICROSERVICE_PORT
              value: {{ default "" $service.ports.tcp | quote }}
            - name: DB_STRATEGY
              valueFrom:
                configMapKeyRef:
                  name: {{ include "artium-backend.fullname" $ }}-runtime
                  key: DB_STRATEGY
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: {{ include "artium-backend.fullname" $ }}-runtime
                  key: REDIS_HOST
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: {{ include "artium-backend.fullname" $ }}-runtime
                  key: REDIS_PORT
            - name: RABBITMQ_URI
              valueFrom:
                configMapKeyRef:
                  name: {{ include "artium-backend.fullname" $ }}-runtime
                  key: RABBITMQ_URI
            - name: OUTBOX_PROCESSOR_ENABLED
              value: "false"
            - name: BLOCKCHAIN_LISTENER_ENABLED
              value: "false"
            - name: ETHEREUM_CONFIRMATION_RETRY_ENABLED
              value: "false"
            - name: NOTIFICATION_PROCESSOR_ENABLED
              value: "false"
          envFrom:
            - configMapRef:
                name: {{ include "artium-backend.fullname" $ }}-runtime
            - secretRef:
                name: {{ $.Values.sealedSecrets.name | quote }}
          resources:
            {{- toYaml (default dict $service.resources) | nindent 12 }}
          startupProbe:
            {{- if $service.ports.http }}
            httpGet:
              path: /health
              port: http
            {{- else }}
            tcpSocket:
              port: tcp
            {{- end }}
            failureThreshold: 30
            periodSeconds: 10
          readinessProbe:
            {{- if $service.ports.http }}
            httpGet:
              path: /health
              port: http
            {{- else }}
            tcpSocket:
              port: tcp
            {{- end }}
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            {{- if $service.ports.http }}
            httpGet:
              path: /health
              port: http
            {{- else }}
            tcpSocket:
              port: tcp
            {{- end }}
            initialDelaySeconds: 30
            periodSeconds: 20
{{- end }}
{{- end }}
