apiVersion: v1
kind: Pod
metadata:
  name: {{ include "artium-backend.fullname" . }}-gateway-smoke
  namespace: {{ .Values.namespace.name | quote }}
  labels:
    {{- include "artium-backend.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: test
spec:
  restartPolicy: Never
  {{- with .Values.imagePullSecrets }}
  imagePullSecrets:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  containers:
    - name: curl
      image: curlimages/curl:8.8.0
      command:
        - sh
        - -c
        - curl -fsS http://{{ include "artium-backend.serviceName" (dict "root" . "name" "api-gateway") }}:8081/health
