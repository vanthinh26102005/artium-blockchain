apiVersion: v1
kind: Service
metadata:
  name: db-artwork
  namespace: dev
  labels:
    app: db-artwork
spec:
  clusterIP: None
  ports:
    - port: 5432
      targetPort: 5432
      name: postgres
  selector:
    app: db-artwork
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: db-artwork
  namespace: dev
spec:
  serviceName: db-artwork
  replicas: 1
  selector:
    matchLabels:
      app: db-artwork
  template:
    metadata:
      labels:
        app: db-artwork
    spec:
      containers:
        - name: postgres
          image: postgres:17
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_USER
              value: "artwork_user"
            - name: POSTGRES_PASSWORD
              value: "1"
            - name: POSTGRES_DB
              value: "artwork_db"
            - name: TZ
              value: "Asia/Ho_Chi_Minh"
          volumeMounts:
            - name: postgres_artwork_data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command:
                - /usr/bin/pg_isready
                - -U
                - artwork_user
                - -d
                - artwork_db
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            limits:
              cpu: "500m"
              memory: "768Mi"
            requests:
              cpu: "500m"
              memory: "512Mi"
  volumeClaimTemplates:
    - metadata:
        name: postgres_artwork_data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 2Gi
