apiVersion: apps/v1
kind: Deployment
metadata:
  name: messaging-service
  namespace: dev
  labels:
    app: messaging-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: messaging-service
  template:
    metadata:
      labels:
        app: messaging-service
    spec:
      containers:
        - name: messaging-service
          image: dgpthinh/messaging-service:v1
          command: ["yarn", "run", "dev:messaging"]
          ports:
            - containerPort: 3004
          readinessProbe:
            tcpSocket:
              port: 3004
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 3004
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            limits:
              cpu: "300m"
              memory: "384Mi"
            requests:
              cpu: "250m"
              memory: "256Mi"
          volumeMounts:
            - name: messaging-service
              mountPath: /app
            - name: node-modules
              mountPath: /app/node_modules
      volumes:
        - name: messaging-service
          emptyDir: {}
        - name: messaging-node-modules
          emptyDir: {}