apiVersion: apps/v1
kind: Deployment
metadata:
  name: identity-service
  namespace: dev
  labels:
    app: identity-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: identity-service
  template:
    metadata:
      labels:
        app: identity-service
    spec:
      containers:
        - name: identity-service
          image: dgpthinh/identity-service:v1
          command: ["yarn", "run", "dev:identity"]
          ports:
            - containerPort: 3001
          readinessProbe:
            tcpSocket:
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 3001
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            limits:
              cpu: "300m"
              memory: "384Mi"
            requests:
              cpu: "250m"
              memory: "256Mi"
          volumeMounts:
            - name: identity-service
              mountPath: /app
            - name: node-modules
              mountPath: /app/node_modules
      volumes:
        - name: identity-service
          emptyDir: {}
        - name: identity-node-modules
          emptyDir: {}