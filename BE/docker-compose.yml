      SHARED_DB_HOST: db-shared
      SHARED_DB_PORT: 5432
      SHARED_DB_USERNAME: postgres
      SHARED_DB_PASSWORD: "1"
      SHARED_DB_NAME: artium_global
      DB_HOST: db-community
      DB_PORT: 5432
      DB_USER: community_user
      DB_PASS: "1"
      DB_NAME: community_db
      REDIS_HOST: redis
