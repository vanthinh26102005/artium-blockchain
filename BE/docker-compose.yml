volumes:
  postgres_shared_data:
  postgres_identity_data:
  postgres_notifications_data:
  postgres_artwork_data:
  postgres_messaging_data:
  postgres_payments_data:
  postgres_events_data:
  postgres_orders_data:
  postgres_community_data:

  gateway_node_modules:
  identity_node_modules:
  notifications_node_modules:
  orders_node_modules:
  artwork_node_modules:
  messaging_node_modules:
  payments_node_modules:
  events_node_modules:
  community_node_modules:

  rabbitmq_data:
