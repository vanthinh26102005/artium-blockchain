services:

  # ---------------------------
  # PostgreSQL Databases
  # ---------------------------
  db-shared:
    image: postgres:17
    container_name: db-shared
    profiles: ["shared"]
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "1"
      POSTGRES_DB: artium_global
      TZ: Asia/Ho_Chi_Minh
    ports:
      - "5454:5432"
    volumes:
      - postgres_shared_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d artium_global"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - infra_network

  db-identity:
    image: postgres:17
    container_name: db-identity
    profiles: ["isolated"]
    environment:
      POSTGRES_USER: identity_user
      POSTGRES_PASSWORD: "1"
      POSTGRES_DB: identity_db
      TZ: Asia/Ho_Chi_Minh
    ports:
      - "5437:5432"
    volumes:
      - postgres_identity_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U identity_user -d identity_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: "768M"
        reservations:
          cpus: "0.50"
          memory: "512M"
    networks:
      - infra_network

  db-notifications:
    image: postgres:17
    container_name: db-notifications
    profiles: ["isolated"]
    environment:
      POSTGRES_USER: notifications_user
      POSTGRES_PASSWORD: "1"
      POSTGRES_DB: notifications_db
      TZ: Asia/Ho_Chi_Minh
    ports:
      - "5433:5432"
    volumes:
      - postgres_notifications_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notifications_user -d notifications_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: "768M"
        reservations:
          cpus: "0.50"
          memory: "512M"
    networks:
      - infra_network

  db-artwork:
