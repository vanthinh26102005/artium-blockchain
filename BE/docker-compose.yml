services:

  # ---------------------------
  # PostgreSQL Databases
  # ---------------------------
  db-shared:
    image: postgres:17
    container_name: db-shared
    profiles: ["shared"]
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${SHARED_DB_PASSWORD:-1}
      POSTGRES_DB: artium_global
      TZ: Asia/Ho_Chi_Minh
    ports:
      - "5454:5432"
    volumes:
      - postgres_shared_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d artium_global"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - infra_network

  db-identity:
    image: postgres:17
    container_name: db-identity
    profiles: ["isolated"]
    environment:
      POSTGRES_USER: identity_user
      POSTGRES_PASSWORD: ${IDENTITY_DB_PASSWORD:-1}
      POSTGRES_DB: identity_db
      TZ: Asia/Ho_Chi_Minh
    ports:
      - "5437:5432"
    volumes:
      - postgres_identity_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U identity_user -d identity_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: "768M"
        reservations:
          cpus: "0.50"
          memory: "512M"
    networks:
      - infra_network

  db-notifications:
    image: postgres:17
    container_name: db-notifications
    profiles: ["isolated"]
    environment:
      POSTGRES_USER: notifications_user
      POSTGRES_PASSWORD: "1"
      POSTGRES_DB: notifications_db
      TZ: Asia/Ho_Chi_Minh
    ports:
      - "5433:5432"
    volumes:
      - postgres_notifications_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notifications_user -d notifications_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: "768M"
        reservations:
          cpus: "0.50"
          memory: "512M"
    networks:
      - infra_network

  db-artwork:
    image: postgres:17
    container_name: db-artwork
    profiles: ["isolated"]
    environment:
      POSTGRES_USER: artwork_user
      POSTGRES_PASSWORD: "1"
      POSTGRES_DB: artwork_db
      TZ: Asia/Ho_Chi_Minh
    ports:
      - "5434:5432"
    volumes:
      - postgres_artwork_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U artwork_user -d artwork_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: "768M"
        reservations:
          cpus: "0.50"
          memory: "512M"
    networks:
      - infra_network

  db-messaging:
    image: postgres:17
    container_name: db-messaging
    profiles: ["isolated"]
    environment:
      POSTGRES_USER: messaging_user
      POSTGRES_PASSWORD: "1"
      POSTGRES_DB: messaging_db
      TZ: Asia/Ho_Chi_Minh
    ports:
      - "5435:5432"
    volumes:
      - postgres_messaging_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U messaging_user -d messaging_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: "768M"
        reservations:
          cpus: "0.50"
          memory: "512M"
    networks:
      - infra_network

  db-payments:
    image: postgres:17
    container_name: db-payments
    profiles: ["isolated"]
    environment:
      POSTGRES_USER: payments_user
      POSTGRES_PASSWORD: ${PAYMENTS_DB_PASSWORD:-1}
      POSTGRES_DB: payments_db
      TZ: Asia/Ho_Chi_Minh
    ports:
      - "5436:5432"
    volumes:
      - postgres_payments_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payments_user -d payments_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: "768M"
        reservations:
          cpus: "0.50"
          memory: "512M"
    networks:
      - infra_network

  db-orders:
    image: postgres:17
    container_name: db-orders
    profiles: ["isolated"]
    environment:
      POSTGRES_USER: orders_user
      POSTGRES_PASSWORD: ${ORDERS_DB_PASSWORD:-1}
      POSTGRES_DB: orders_db
      TZ: Asia/Ho_Chi_Minh
    ports:
      - "5440:5432"
    volumes:
      - postgres_orders_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orders_user -d orders_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: "768M"
        reservations:
          cpus: "0.50"
          memory: "512M"
    networks:
      - infra_network

  db-events:
    image: postgres:17
    container_name: db-events
    profiles: ["isolated"]
    environment:
      POSTGRES_USER: events_user
      POSTGRES_PASSWORD: "1"
      POSTGRES_DB: events_db
      TZ: Asia/Ho_Chi_Minh
    ports:
      - "5438:5432"
    volumes:
      - postgres_events_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U events_user -d events_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: "768M"
        reservations:
          cpus: "0.50"
          memory: "512M"
    networks:
      - infra_network

  db-community:
    image: postgres:17
    container_name: db-community
    profiles: ["isolated"]
    environment:
      POSTGRES_USER: community_user
      POSTGRES_PASSWORD: "1"
      POSTGRES_DB: community_db
      TZ: Asia/Ho_Chi_Minh
    ports:
      - "5439:5432"
    volumes:
      - postgres_community_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U community_user -d community_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: "768M"
        reservations:
          cpus: "0.50"
          memory: "512M"
    networks:
      - infra_network

  # ---------------------------
  # Messaging & Cache
  # ---------------------------
  rabbitmq:
    build:
      context: .
      dockerfile: ./infrastructure/docker/rabbitmq/Dockerfile
    container_name: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-myuser}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-mypassword}
      TZ: Asia/Ho_Chi_Minh
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: "768M"
        reservations:
          cpus: "0.40"
          memory: "512M"
    networks:
      - infra_network

  redis:
    image: redis:8.2-alpine
    container_name: med-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: "256M"
        reservations:
          cpus: "0.25"
          memory: "128M"
    networks:
      - infra_network

  mailhog:
    image: mailhog/mailhog:latest
    container_name: med-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: "128M"
    networks:
      - infra_network

  api-gateway:
    container_name: api-gateway
    build:
      context: .
      dockerfile: ./apps/api-gateway/Dockerfile
    command: yarn dev:gateway
    ports:
      - "8081:8081"
    env_file:
      - ./apps/api-gateway/.env.compose
    environment:
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set in environment}
      NODE_ENV: ${NODE_ENV:-development}
    volumes:
      - .:/app
      - gateway_node_modules:/app/node_modules
    depends_on:
      - identity-service
      - artwork-service
      - payments-service
      - orders-service
      - messaging-service
      - notifications-service
      - events-service
      - community-service
    networks:
      - services_network

  # ---------------------------
  # Microservices
  # ---------------------------
  identity-service:
    container_name: identity-service
    build:
      context: .
      dockerfile: ./apps/identity-service/Dockerfile
    command: yarn dev:identity
    ports:
      - "3001:3001"
    env_file:
      - ./apps/identity-service/.env.compose
    environment:
      SHARED_DB_PASSWORD: ${SHARED_DB_PASSWORD:-1}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set in environment}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      RABBITMQ_URI: ${RABBITMQ_URI:-amqp://myuser:mypassword@rabbitmq:5672}
    volumes:
      - .:/app
      - identity_node_modules:/app/node_modules
    depends_on:
      - rabbitmq
      - redis
    networks:
      - infra_network
      - services_network

  notifications-service:
    container_name: notifications-service
    build:
      context: .
      dockerfile: ./apps/notifications-service/Dockerfile
    command: yarn dev:notifications
    ports:
      - "3006:3006"
    env_file:
      - ./apps/notifications-service/.env.compose
    environment:
      SHARED_DB_PASSWORD: ${SHARED_DB_PASSWORD:-1}
      RABBITMQ_URI: ${RABBITMQ_URI:-amqp://myuser:mypassword@rabbitmq:5672}
    volumes:
      - .:/app
      - notifications_node_modules:/app/node_modules
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_started
      mailhog:
        condition: service_started
    networks:
      - infra_network
      - services_network

  artwork-service:
    container_name: artwork-service
    build:
      context: .
      dockerfile: ./apps/artwork-service/Dockerfile
    command: yarn dev:artwork
    ports:
      - "3002:3002"
      # TCP microservice port (internal only for API Gateway)
    env_file:
      - ./apps/artwork-service/.env.compose
    environment:
      SHARED_DB_PASSWORD: ${SHARED_DB_PASSWORD:-1}
      RABBITMQ_URI: ${RABBITMQ_URI:-amqp://myuser:mypassword@rabbitmq:5672}
    volumes:
      - .:/app
      - artwork_node_modules:/app/node_modules
      - ./config/gcs-service-account.json:/app/config/gcs-service-account.json:ro
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - infra_network
      - services_network

  orders-service:
    container_name: orders-service
    build:
      context: .
      dockerfile: ./apps/orders-service/Dockerfile
    command: yarn dev:orders
    ports:
      - "3004:3004"
    env_file:
      - ./apps/orders-service/.env.compose
    environment:
      SHARED_DB_PASSWORD: ${SHARED_DB_PASSWORD:-1}
      PLATFORM_PRIVATE_KEY: ${PLATFORM_PRIVATE_KEY:?PLATFORM_PRIVATE_KEY must be set in environment}
      CONTRACT_ADDRESS: ${CONTRACT_ADDRESS:?CONTRACT_ADDRESS must be set in environment}
      BLOCKCHAIN_RPC_URL: ${BLOCKCHAIN_RPC_URL:?BLOCKCHAIN_RPC_URL must be set in environment}
      RABBITMQ_URI: ${RABBITMQ_URI:-amqp://myuser:mypassword@rabbitmq:5672}
    volumes:
      - .:/app
      - orders_node_modules:/app/node_modules
    depends_on:
      - rabbitmq
    networks:
      - infra_network
      - services_network

  messaging-service:
    container_name: messaging-service
    build:
      context: .
      dockerfile: ./apps/messaging-service/Dockerfile
    command: yarn dev:messaging
    ports:
      - "3005:3005"
      # TCP microservice port (internal only for API Gateway)
    env_file:
      - ./apps/messaging-service/.env.compose
    environment:
      SHARED_DB_PASSWORD: ${SHARED_DB_PASSWORD:-1}
      RABBITMQ_URI: ${RABBITMQ_URI:-amqp://myuser:mypassword@rabbitmq:5672}
    volumes:
      - .:/app
      - messaging_node_modules:/app/node_modules
      - ./config/gcs-service-account.json:/app/config/gcs-service-account.json:ro
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - infra_network
      - services_network

  payments-service:
    container_name: payments-service
    build:
      context: .
      dockerfile: ./apps/payments-service/Dockerfile
    command: yarn dev:payments
    ports:
      - "3003:3003"
    env_file:
      - ./apps/payments-service/.env.compose
    environment:
      SHARED_DB_PASSWORD: ${SHARED_DB_PASSWORD:-1}
      RABBITMQ_URI: ${RABBITMQ_URI:-amqp://myuser:mypassword@rabbitmq:5672}
      STRIPE_API_KEY: ${STRIPE_API_KEY:?STRIPE_API_KEY must be set in environment}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:?STRIPE_WEBHOOK_SECRET must be set in environment}
      PLATFORM_PRIVATE_KEY: ${PLATFORM_PRIVATE_KEY:?PLATFORM_PRIVATE_KEY must be set in environment}
      PLATFORM_ETH_WALLET: ${PLATFORM_ETH_WALLET:?PLATFORM_ETH_WALLET must be set in environment}
      ETHEREUM_QUOTE_SIGNING_SECRET: ${ETHEREUM_QUOTE_SIGNING_SECRET:?ETHEREUM_QUOTE_SIGNING_SECRET must be set in environment}
    volumes:
      - .:/app
      - payments_node_modules:/app/node_modules
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - infra_network
      - services_network

  events-service:
    container_name: events-service
    build:
      context: .
      dockerfile: ./apps/events-service/Dockerfile
    command: yarn dev:events
    ports:
      - "3007:3007"
    env_file:
      - ./apps/events-service/.env.compose
    environment:
      SHARED_DB_PASSWORD: ${SHARED_DB_PASSWORD:-1}
      RABBITMQ_URI: ${RABBITMQ_URI:-amqp://myuser:mypassword@rabbitmq:5672}
    volumes:
      - .:/app
      - events_node_modules:/app/node_modules
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - infra_network
      - services_network

  community-service:
    container_name: community-service
    build:
      context: .
      dockerfile: ./apps/community-service/Dockerfile
    command: yarn dev:community
    ports:
      - "3009:3009"
    env_file:
      - ./apps/community-service/.env.compose
    environment:
      SHARED_DB_PASSWORD: ${SHARED_DB_PASSWORD:-1}
      RABBITMQ_URI: ${RABBITMQ_URI:-amqp://myuser:mypassword@rabbitmq:5672}
    volumes:
      - .:/app
      - community_node_modules:/app/node_modules
      - ./config/gcs-service-account.json:/app/config/gcs-service-account.json:ro
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - infra_network
      - services_network

volumes:
  postgres_shared_data:
  postgres_identity_data:
  postgres_notifications_data:
  postgres_artwork_data:
  postgres_messaging_data:
  postgres_payments_data:
  postgres_events_data:
  postgres_orders_data:
  postgres_community_data:

  gateway_node_modules:
  identity_node_modules:
  notifications_node_modules:
  orders_node_modules:
  artwork_node_modules:
  messaging_node_modules:
  payments_node_modules:
  events_node_modules:
  community_node_modules:

  rabbitmq_data:
  redis_data:

# ===========================
# Networks
# ===========================
networks:
  infra_network:
    driver: bridge

  services_network:
    driver: bridge
