      TZ: Asia/Ho_Chi_Minh
    ports:
      - "5435:5432"
    volumes:
      - postgres_messaging_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U messaging_user -d messaging_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
