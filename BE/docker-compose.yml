      MAX_FILE_SIZE_MB: 10
      ALLOWED_FILE_TYPES: image/jpeg,image/png,image/webp,image/jpg,image/gif,video/mp4,video/webm,application/pdf,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document
