  db-community:
    image: postgres:17
    container_name: db-community
    profiles: ["isolated"]
    environment:
      POSTGRES_USER: community_user
      POSTGRES_PASSWORD: "1"
      POSTGRES_DB: community_db
      TZ: Asia/Ho_Chi_Minh
    ports:
      - "5439:5432"
    volumes:
      - postgres_community_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U community_user -d community_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: "768M"
        reservations:
          cpus: "0.50"
          memory: "512M"
    networks:
      - infra_network

  # ---------------------------
  # Messaging & Cache
  # ---------------------------
  rabbitmq:
    build:
      context: .
      dockerfile: ./infrastructure/docker/rabbitmq/Dockerfile
    container_name: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: myuser
      RABBITMQ_DEFAULT_PASS: mypassword
      TZ: Asia/Ho_Chi_Minh
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: "768M"
        reservations:
          cpus: "0.40"
          memory: "512M"
    networks:
      - infra_network

  redis:
    image: redis:8.2-alpine
    container_name: med-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: "256M"
        reservations:
          cpus: "0.25"
          memory: "128M"
    networks:
      - infra_network

  mailhog:
    image: mailhog/mailhog:latest
    container_name: med-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: "128M"
    networks:
      - infra_network

  api-gateway:
    container_name: api-gateway
    build:
      context: .
      dockerfile: ./apps/api-gateway/Dockerfile
    command: yarn dev:gateway
    ports:
      - "8081:8081"
    environment:
      PORT: 8081
      IDENTITY_SERVICE_HOST: identity-service
      IDENTITY_SERVICE_PORT: 3101
      ARTWORK_SERVICE_HOST: artwork-service
      ARTWORK_SERVICE_PORT: 3102
      PAYMENTS_SERVICE_HOST: payments-service
      PAYMENTS_SERVICE_PORT: 3103
      ORDERS_SERVICE_HOST: orders-service
      ORDERS_SERVICE_PORT: 3104
      MESSAGING_SERVICE_HOST: messaging-service
      MESSAGING_SERVICE_PORT: 3105
      NOTIFICATIONS_SERVICE_HOST: notifications-service
      NOTIFICATIONS_SERVICE_PORT: 3106
      EVENTS_SERVICE_HOST: events-service
      EVENTS_SERVICE_PORT: 3107
      COMMUNITY_SERVICE_HOST: community-service
      COMMUNITY_SERVICE_PORT: 3109
      JWT_SECRET: 5c3bf5bfc210c43aa7342efcb40bc0eb6831ac38ea12de39578d09afaec6d37e
      TZ: Asia/Ho_Chi_Minh
    volumes:
      - .:/app
      - gateway_node_modules:/app/node_modules
    depends_on:
      - identity-service
      - artwork-service
      - payments-service
      - messaging-service
      - notifications-service
      - events-service
      - community-service
    networks:
      - services_network

  # ---------------------------
  # Microservices
  # ---------------------------
  identity-service:
    container_name: identity-service
    build:
      context: .
      dockerfile: ./apps/identity-service/Dockerfile
    command: yarn dev:identity
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      MICROSERVICE_PORT: 3101
      MICROSERVICE_HOST: 0.0.0.0
      DB_STRATEGY: ${DB_STRATEGY:-SHARED}
      DB_SYNCHRONIZE: "true"
      SHARED_DB_HOST: db-shared
      SHARED_DB_PORT: 5432
      SHARED_DB_USERNAME: postgres
      SHARED_DB_PASSWORD: "1"
      SHARED_DB_NAME: artium_global
      DB_HOST: db-identity
      DB_PORT: 5432
      DB_USER: identity_user
      DB_PASS: "1"
      DB_NAME: identity_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: 5c3bf5bfc210c43aa7342efcb40bc0eb6831ac38ea12de39578d09afaec6d37e
      JWT_EXPIRES_IN: 1d
      GOOGLE_CLIENT_ID: 873456140774-gi4pt3aq0m3gpd5f10uv4ivv59lvbgej.apps.googleusercontent.com
      GOOGLE_CLIENT_SECRET: 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
      SIWE_ALLOWED_CHAIN_IDS: 11155111
      SIWE_DOMAIN: localhost:3000
      SIWE_URI: http://localhost:3000
      RABBITMQ_URI: amqp://myuser:mypassword@rabbitmq:5672
      TZ: Asia/Ho_Chi_Minh
    volumes:
      - .:/app
      - identity_node_modules:/app/node_modules
    depends_on:
      - rabbitmq
      - redis
    networks:
      - infra_network
      - services_network

