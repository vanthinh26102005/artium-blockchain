      context: .
      dockerfile: ./apps/notifications-service/Dockerfile
    command: yarn dev:notifications
    ports:
      - "3006:3006"
    environment:
      PORT: 3006
      MICROSERVICE_PORT: 3106
      MICROSERVICE_HOST: 0.0.0.0
      DB_STRATEGY: ${DB_STRATEGY:-SHARED}
      DB_SYNCHRONIZE: "true"
      SHARED_DB_HOST: db-shared
      SHARED_DB_PORT: 5432
      SHARED_DB_USERNAME: postgres
      SHARED_DB_PASSWORD: "1"
      SHARED_DB_NAME: artium_global
      DB_HOST: db-notifications
      DB_PORT: 5432
      DB_USER: notifications_user
      DB_PASS: "1"
      DB_NAME: notifications_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
      GOOGLE_CLIENT_ID: 873456140774-gi4pt3aq0m3gpd5f10uv4ivv59lvbgej.apps.googleusercontent.com
      GOOGLE_CLIENT_SECRET: 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
      RABBITMQ_URI: amqp://myuser:mypassword@rabbitmq:5672
      SMTP_HOST: mailhog
      SMTP_PORT: 1025
      SMTP_USER: ""
      SMTP_PASS: ""
      SMTP_FROM: noreply@artium.com
      TZ: Asia/Ho_Chi_Minh
    volumes:
      - .:/app
      - notifications_node_modules:/app/node_modules
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_started
      mailhog:
        condition: service_started
    networks:
      - infra_network
      - services_network

  artwork-service:
    container_name: artwork-service
    build:
      context: .
      dockerfile: ./apps/artwork-service/Dockerfile
    command: yarn dev:artwork
    ports:
      - "3002:3002"
      # TCP microservice port (internal only for API Gateway)
    environment:
      PORT: 3002
      MICROSERVICE_PORT: 3102
      MICROSERVICE_HOST: 0.0.0.0
      DB_STRATEGY: ${DB_STRATEGY:-SHARED}
      DB_SYNCHRONIZE: "true"
