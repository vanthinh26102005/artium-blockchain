      SHARED_DB_HOST: db-shared
      SHARED_DB_PORT: 5432
      SHARED_DB_USERNAME: postgres
      SHARED_DB_PASSWORD: "1"
      SHARED_DB_NAME: artium_global
      DB_HOST: db-payments
      DB_PORT: 5432
      DB_USER: payments_user
      DB_PASS: "1"
      DB_NAME: payments_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RABBITMQ_URI: amqp://myuser:mypassword@rabbitmq:5672
      STRIPE_API_KEY: ${STRIPE_API_KEY:-sk_test_51Soh8gRDpKThXbxEj7jOIXEQ8pDSCrIUkMXsPeVs4ChFcVfP7YwPxw7yJh4OTkLWU5zMe0Pq0SF1NDitQa7WYnHV006398hDVl}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-whsec_9bd3a32e9a38185ed4645cb41f4dfab380b832da491fe2db1baf0ef92d7cb124}
      PLATFORM_PRIVATE_KEY: ${PLATFORM_PRIVATE_KEY:-0x1b4b5319b42ea0c0cb9c1d040452efbd90b4c4d7cecf639db41348aac043d780}
      PLATFORM_ETH_WALLET: ${PLATFORM_ETH_WALLET:-0x77a2Ac8226Cdbb13aD77859B204405ABb0AE2E89}
