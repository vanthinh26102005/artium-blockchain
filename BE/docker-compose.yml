    environment:
      PORT: 3007
      MICROSERVICE_PORT: 3107
      MICROSERVICE_HOST: 0.0.0.0
      DB_STRATEGY: ${DB_STRATEGY:-SHARED}
      DB_SYNCHRONIZE: "true"
      SHARED_DB_HOST: db-shared
      SHARED_DB_PORT: 5432
